codecov:
  # Only report a passing coverage status when the CI build/tests actually pass,
  # so a green Codecov check can't green-light a merge whose tests never ran.
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: 80%
    patch:
      default:
        target: 90%
        threshold: 5%

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  hide_project_coverage: TRUE

# JaCoCo/Maven will define included/excluded files via reports; no extra Codecov ignores here.
