# GitHub Action workflow for releasing artifacts to Maven Central.
# Triggered manually via workflow_dispatch with an explicit release_version
# input (there is no tag trigger). It handles:
# - Version management from the release_version input (not from git tags)
# - GPG signing of artifacts
# - Deployment to Maven Central via Sonatype

name: Release to Maven Central

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., 0.2.0)'
        required: true
        type: string

# Serialize releases: never run two release jobs at once, and never cancel an
# in-progress release (cancelling mid-deploy could leave a partial publish).
concurrency:
  group: maven-central-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      # Needed to open the version-bump pull request instead of pushing to main.
      pull-requests: write
      # Required to create build-provenance attestations for the released jars.
      id-token: write
      attestations: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          
      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_SIGNING_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          
      - name: Determine version
        id: version
        env:
          RELEASE_VERSION: ${{ github.event.inputs.release_version }}
        run: |
          # Do NOT interpolate the workflow input directly into the shell;
          # read the untrusted input from an environment variable instead to
          # avoid script injection.
          VERSION="$RELEASE_VERSION"

          # Validate against a strict semver pattern before using it anywhere.
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid release version '$VERSION'. Expected semver, e.g. 0.2.0 or 0.2.0-beta.1"
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"
          
      - name: Update POM versions
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "Setting version to $VERSION"
          
          # Update parent POM
          mvn versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false
          
          # Update module POMs
          mvn versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false -pl core
          mvn versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false -pl processor

      - name: Update reproducible build timestamp
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          TIMESTAMP="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "Setting project.build.outputTimestamp to $TIMESTAMP for release $VERSION"
          # Pin archive entry timestamps to the release moment for reproducible builds.
          mvn versions:set-property -Dproperty=project.build.outputTimestamp -DnewVersion="$TIMESTAMP" -DgenerateBackupPoms=false -pl core,processor
          
      - name: Commit version changes
        id: commit
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          BRANCH="release/v$VERSION"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Commit the version bump on a dedicated release branch so the
          # update to main goes through a reviewed pull request instead of a
          # direct push that bypasses branch protection.
          git checkout -B "$BRANCH"
          git add pom.xml core/pom.xml processor/pom.xml
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          # Only commit if there are changes. Note: no "[skip ci]" so the
          # release branch / PR is validated by CI.
          if git diff --staged --quiet; then
            echo "No version changes detected - version already set to $VERSION"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: release version $VERSION"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
          
      - name: Create Git tag
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Only create tag if it doesn't exist
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists"
          else
            git tag -a "v$VERSION" -m "Release version $VERSION"
          fi
          
      - name: Build and verify
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_SIGNING_KEY_PASSWORD }}
        run: mvn -B clean verify -Prelease

      - name: Generate SBOM (CycloneDX)
        run: |
          # Emit a CycloneDX SBOM (JSON + XML) for each published module.
          mvn -B -Prelease -pl core,processor \
            org.cyclonedx:cyclonedx-maven-plugin:makeBom -DskipTests
        
      - name: Deploy (stage) to Maven Central
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_SIGNING_KEY_PASSWORD }}
        run: |
          # Run tests against the artifacts being deployed (do NOT skip tests)
          # and only STAGE the release to the Sonatype Central portal
          # (autoPublish defaults to false). A maintainer must review and
          # manually publish the staged deployment, so nothing is auto-released
          # to Maven Central without human approval.
          mvn -B deploy -Prelease -pl core,processor -Dcentral.autoPublish=false

      # Generates a signed build-provenance attestation for the released JARs. This is
      # GitHub's official attestation action; the resulting SLSA attestation is stored in
      # the repository's Attestations page and can be verified by consumers with:
      #   gh attestation verify <jar> --repo java-helpers/simple-builders
      - name: Attest build provenance for published jars
        if: success()
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1 (GitHub official)
        with:
          subject-path: |
            core/target/simple-builders-core-*.jar
            processor/target/simple-builders-processor-*.jar
          
      - name: Push release branch and tag
        if: success()
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          BRANCH="${{ steps.commit.outputs.branch }}"

          # Push the release branch (never push directly to main).
          if [ "${{ steps.commit.outputs.has_changes }}" = "true" ]; then
            git push origin "$BRANCH"
          fi

          # Push tag if it was newly created (check if tag exists remotely)
          if ! git ls-remote --tags origin | grep -q "refs/tags/v$VERSION"; then
            git push origin "v$VERSION"
          else
            echo "Tag v$VERSION already exists remotely"
          fi

      - name: Open version bump pull request
        if: success() && steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          BRANCH="${{ steps.commit.outputs.branch }}"

          # Open a reviewed PR to update main instead of pushing to it. This
          # preserves branch protection and required reviews on main.
          if gh pr view "$BRANCH" >/dev/null 2>&1; then
            echo "Pull request for $BRANCH already exists"
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: release version $VERSION" \
              --body "Automated version bump for release v$VERSION. Review and merge to update \`main\`; created via PR so branch protection is not bypassed."
          fi
          
      - name: Create GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          
          # Check if release already exists
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists"
          else
            PRERELEASE_FLAG=""
            if [[ "$VERSION" == *"-"* ]]; then
              PRERELEASE_FLAG="--prerelease"
            fi
            
            # Generate release notes and replace version placeholder
            gh api repos/java-helpers/simple-builders/releases/generate-notes \
              -f tag_name="v$VERSION" \
              -f target_commitish="main" \
              --jq '.body' > release_notes.md
            
            # Replace version placeholder in generated notes
            sed -i "s/\$RESOLVED_VERSION/$VERSION/g" release_notes.md
            
            # Create draft release with custom notes and attach artifacts
            gh release create "v$VERSION" \
              --title "Release $VERSION" \
              --draft \
              --notes-file release_notes.md \
              $PRERELEASE_FLAG \
              core/target/simple-builders-core-${VERSION}.jar \
              core/target/simple-builders-core-${VERSION}-sources.jar \
              core/target/simple-builders-core-${VERSION}-javadoc.jar \
              core/target/simple-builders-core-${VERSION}-sbom.json \
              core/target/simple-builders-core-${VERSION}-sbom.xml \
              processor/target/simple-builders-processor-${VERSION}.jar \
              processor/target/simple-builders-processor-${VERSION}-sources.jar \
              processor/target/simple-builders-processor-${VERSION}-javadoc.jar \
              processor/target/simple-builders-processor-${VERSION}-sbom.json \
              processor/target/simple-builders-processor-${VERSION}-sbom.xml
            
            # Clean up
            rm -f release_notes.md
          fi
