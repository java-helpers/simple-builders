version: 2
updates:
  # Keep the GitHub Actions used in the workflows up to date. This matters most
  # once actions are SHA-pinned: a pinned SHA never gets security updates on its
  # own, so Dependabot opens PRs that bump the pinned SHAs as new releases land.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "maven" # See documentation for possible values
    directories:
      - "/core"
      - "/processor"
      - "/example-custom-generator"
      - "/example"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "java"
    groups:
      # Group all library dependencies together (excluding plugins)
      dependencies:
        exclude-patterns:
          - "org.apache.maven.plugins:*"
          - "com.spotify.fmt:*"
          - "org.jacoco:*"
          - "org.sonatype.central:*"
        update-types:
          - "minor"
          - "patch"
      # Group Maven plugins together
      maven-plugins:
        patterns:
          - "org.apache.maven.plugins:*"
          - "com.spotify.fmt:*"
          - "org.jacoco:*"
          - "org.sonatype.central:*"
        update-types:
          - "minor"
          - "patch"
